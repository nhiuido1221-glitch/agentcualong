name: Daily News Bot

on:
  schedule:
    # Tự động chạy vào đúng 07:00 sáng giờ Việt Nam mỗi ngày
    - cron: '0 0 * * *'
  workflow_dispatch: # Tạo nút bấm chạy bằng tay để test

jobs:
  run-bot:
    runs-on: windows-latest # Chuyển sang máy chủ Windows Cloud để nuốt được file .exe

    steps:
      - name: 1. Tải toàn bộ thư mục dự án về máy chủ ảo
        uses: actions/checkout@v4

      - name: 2. Kích hoạt trực tiếp con Bot MetaApp.exe
        env:
          # Nạp key bảo mật từ két sắt Secrets vào file .exe
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: pwsh
        run: |
          $exePath = "Auto_Dev_Agent/build_20260707_225251_d8c5c0/MetaApp.exe"
          if (Test-Path $exePath) {
              Write-Host "🚀 Tìm thấy file thực thi! Đang kích hoạt chạy trên Cloud..."
              & $exePath
          } else {
              Write-Error "❌ LỖI: Không tìm thấy file MetaApp.exe tại đường dẫn trên GitHub!"
              exit 1
          }
