name: Daily News Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest # Quay về máy chủ Linux siêu nhẹ của Cloud

    steps:
      - name: 1. Tải toàn bộ kho chứa về máy chủ ảo
        uses: actions/checkout@v4

      - name: 2. Cài đặt môi trường Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Cài đặt các thư viện bắt buộc
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 google-generativeai python-dotenv

      - name: 4. Dò tìm file gốc và Kích hoạt Bot
        env:
          # Nạp 3 chìa khóa từ két sắt bảo mật
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🔍 Đang dùng Radar tìm file mã nguồn Python..."
          
          # Lệnh quét tìm đích danh file main.py trong thư mục build của anh
          FILE_PATH=$(find . -name "main.py" | grep "build_" | head -n 1)
          
          # Nếu không thấy trong thư mục build, tìm ở ngoài gốc
          if [ -z "$FILE_PATH" ]; then
              FILE_PATH=$(find . -name "main.py" | head -n 1)
          fi
          
          if [ -n "$FILE_PATH" ]; then
              echo "✅ TÌM THẤY FILE GỐC TẠI: $FILE_PATH"
              echo "🚀 Bắt đầu chạy Bot trên mây..."
              python "$FILE_PATH"
          else
              echo "❌ LỖI: Không tìm thấy file main.py nào. Danh sách file:"
              ls -R
              exit 1
          fi
