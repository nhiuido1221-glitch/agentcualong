name: Daily News Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: windows-latest

    steps:
      - name: 1. Tải kho chứa từ GitHub
        uses: actions/checkout@v4

      - name: 2. Giải nén và Kích hoạt MetaApp.exe
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: pwsh
        run: |
          Write-Host "🔍 Đang tìm cục nén MetaApp.zip trên hệ thống..."
          $rarFile = Get-ChildItem -Path . -Filter "MetaApp.rar" -Recurse | Select-Object -First 1
          
          if ($rarFile) {
              Write-Host "✅ Đã thấy! Đang xé vỏ bọc giải nén..."
              $extractPath = "$($rarFile.DirectoryName)\ExtractedApp"
              Expand-Archive -Path $rarFile.FullName -DestinationPath $extractPath -Force
              
              $exe = Get-ChildItem -Path $extractPath -Filter "MetaApp.exe" -Recurse | Select-Object -First 1
              if ($exe) {
                  Write-Host "🚀 File EXE nguyên vẹn! Đang bắn bản tin..."
                  & $exe.FullName
              } else {
                  Write-Error "❌ Giải nén xong nhưng bên trong trống trơn!"
                  exit 1
              }
          } else {
              Write-Error "❌ LỖI: Chưa tải file MetaApp.zip lên GitHub!"
              exit 1
          }
