name: Daily News Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: windows-latest

    steps:
      - name: 1. Tải toàn bộ kho chứa về máy chủ ảo
        uses: actions/checkout@v4

      - name: 2. Tự động dò tìm và Kích hoạt Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: pwsh
        run: |
          Write-Host "🔍 Đang dùng Radar quét tìm file MetaApp.exe trong toàn bộ hệ thống..."
          
          # Lệnh quét tìm đích danh file MetaApp.exe ở bất kỳ thư mục nào
          $exe = Get-ChildItem -Path . -Filter "MetaApp.exe" -Recurse | Select-Object -First 1
          
          if ($exe) {
              Write-Host "✅ TÌM THẤY RỒI! File đang nằm tại: $($exe.FullName)"
              Write-Host "🚀 Đang tiến hành chạy Bot trên Cloud..."
              & $exe.FullName
          } else {
              Write-Host "❌ LỖI: Hoàn toàn không tìm thấy file MetaApp.exe nào trên GitHub!"
              Write-Host "Đây là toàn bộ danh sách file hiện có trên mây của anh:"
              Get-ChildItem -Recurse | Select-Object FullName
              exit 1
          }
